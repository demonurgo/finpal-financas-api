name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Docker smoke test
        shell: bash
        run: |
          cp .env.example .env
          sed -i 's/^JWT_SECRET=.*/JWT_SECRET="finpal-ci-secret-with-32-characters-long"/' .env
          docker compose up -d --build

          for attempt in {1..45}; do
            if curl --fail --silent http://localhost:3000/api/health > health.json; then
              cat health.json
              exit 0
            fi

            sleep 2
          done

          docker compose ps
          docker compose logs app --tail=200
          exit 1

      - name: Tear down Docker smoke stack
        if: always()
        run: docker compose down -v
